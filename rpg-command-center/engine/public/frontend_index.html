<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Farm RPG</title>
<style>
html,body{height:100%;background:#150d08;color:#e8d7b0;font-family:monospace;overflow:hidden;margin:0}
#game{position:relative;width:100%;height:100%}
canvas{display:block;width:100%;height:100%}
#ui{position:absolute;top:10px;left:10px;pointer-events:none;font-size:12px;background:#0008;padding:8px 10px;border-radius:8px}
#dialog{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:#1c1208;border:2px solid #f2c96e;box-shadow:0 10px 30px #000a;padding:14px;border-radius:12px;width:min(720px, 94vw);display:none}
#dialog h2{margin:0 0 8px;color:#f2c96e}
#dialog p{margin:6px 0;line-height:1.35}
#dialog input,#dialog textarea{width:100%;background:#3f2a10;color:#f2c96e;border:1px solid #7a4a18;padding:8px;margin-top:8px;border-radius:6px}
button{background:#7a4a18;color:#f2c96e;border:1px solid #f2c96e;padding:6px 10px;border-radius:6px;cursor:pointer;margin-top:8px}
button:hover{background:#a8681e}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:#0e0804}
</style>
</head>
<body>
<div id="game">
  <div id="loading">Loading Agent Farm…<br><span style="opacity:.7;font-size:12px">Fetching farm state…</span></div>
  <canvas id="world"></canvas>
  <div id="ui">WASD/Arrows to walk • Space to talk • Click to walk</div>
  <div id="dialog">
    <h2 id="dlgTitle">Agent</h2>
    <p id="dlgPersonality">…</p>
    <div id="dlgTask">Current task: <span id="dlgTaskText">…</span><button id="dlgUpdateTask">Update task</button></div>
    <div id="dlgMessage"><p>Recent:</p><div id="dlgRecent">…</div><input id="dlgInput" placeholder="Type a message (tell them to work on something)…" maxlength="240" /><button id="dlgSend">Send</button></div>
    <div id="dlgActions" style="margin-top:8px;"></div>
  </div>
</div>
<script>
(async ()=>{
const $=id=>document.getElementById(id);
const canvas=$('world');
const ctx=canvas.getContext('2d');
const state={agents:[],buildings:{},player:{tileX:40,tileY:40},keys:{}};

let walkQueue=[];
let walkTarget=null;
let occupiedEntity=null;
let lastTick=performance.now();

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

function centerOnPlayer(cam){
  cam.x=state.player.tileX - canvas.width/2/16;
  cam.y=state.player.tileY - canvas.height/2/16;
}
const cam={x:0,y:0};

function gridToPixel(gx,gy){return{x:gx*16,y:gy*16}}

function inBounds(gx,gy){return gx>=0&&gy>=0&&gx<TILE_MAP.cols&&gy<TILE_MAP.rows}

function collides(gx,gy){
  if(!inBounds(gx,gy))return true;
  const t=TILE_MAP.grid[gy][gx];
  if(t>=4&&t<=7)return true; // water/walls
  const nz=(a)=>!a||a.spawned;
  for(const b of BUILDING_RECTS){
    if(gx>=b.x&&gx<b.x+b.w&&gy>=b.y&&gy<b.y+b.h) return true;
  }
  return false;
}

function bfs(startX,startY,endX,endY){
  if(collides(endX,endY))return null;
  const start=performance.now();
  const sx=startX,sy=startY,ex=endX,ey=endY;
  const queue=[{x:sx,y:sy,path:[]}];
  const seen=new Set([`${sx},${sy}`]);
  const maxNodes=4000;
  while(queue.length){
    if((performance.now()-start)>120)return null;
    const cur=queue.shift();
    if(cur.x===ex&&cur.y===ey)return [...cur.path,{x:ex,y:ey}];
    const dirs=[{x:cur.x-1,y:cur.y},{x:cur.x+1,y:cur.y},{x:cur.x,y:cur.y-1},{x:cur.x,y:cur.y+1}];
    for(const n of dirs){
      const k=`${n.x},${n.y}`;
      if(seen.has(k))continue;
      if(collides(n.x,n.y))continue;
      seen.add(k);
      queue.push({x:n.x,y:n.y,path:[...cur.path,{x:cur.x,y:cur.y}]});
      if(queue.length>maxNodes)break;
    }
  }
  return null;
}

function walkTowards(gx,gy){state.player.tileX=gx;state.player.tileY=gy;centerOnPlayer(cam)}

function enqueueWalk(gx,gy){
  const p=state.player;
  if(collides(gx,gy))return false;
  const path=bfs(Math.round(p.tileX),Math.round(p.tileY),gx,gy);
  if(!path)return false;
  walkQueue=path;walkTarget=null;return true;
}

async function api(path,method='GET',body){
  const res=await fetch(path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  if(!res.ok)throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

function buildTree(){return {
  obj:{x:6,y:2,t:'tree'},
  obj1:{x:12,y:4,t:'tree'},
  obj2:{x:88,y:5,t:'tree'},
  obj3:{x:91,y:10,t:'tree'},
  obj4:{x:20,y:80,t:'tree'},
  obj5:{x:80,y:84,t:'tree'}
}}
const DIALOG = {};

function dialogForBuilding(id,b){
  const action=`${id}`;
  DIALOG[`building:${id}`]={
    title:b.name, profileLabel:`Role: ${b.role||'Business station'}`, profile:b.currentTask||'Ready for a task.',
    actions:[{label:b.actionLabel||'Act',action}],
    updateTaskText:'Optional note for next visit', type:'building', kind:id, assigned:b.assignedAgent
  };
}

function dialogForAgent(a){
  const taskText=a.current_task||'No task assigned yet.';
  const name=a.name;
  DIALOG[`agent:${name}`]={
    title:`${a.emoji||'🧑‍💼'} ${name}`, profileLabel:`Role: ${a.role||'Agency Agent'}`, profile:a.personality||taskText,
    actions:[{label:'Set task',action:'revenue'},{label:'Update task',action:'outreach'}],
    updateTaskText:'Todo / task text for the agent', type:'agent', kind:name, assigned:a.assignedAgent
  };
}

function wireDialog(){
  $('dlgTitle').textContent='…';
  $('dlgPersonality').textContent='';
  $('dlgTaskText').textContent='';
  $('dlgRecent').textContent='';
  $('dlgActions').innerHTML='';
  $('dlgSend').onclick=async ()=>{
    const input=$('dlgInput');
    const msg=input.value.trim();if(!msg||!occupiedEntity)return;
    input.value='';
    if(occupiedEntity.type==='agent'){
      const a=occupiedEntity.data;
      await sendAgentMessage(a,msg);
    }else if(occupiedEntity.type==='building'){
      const b=occupiedEntity.data;
      await sendBuildingAction(b,msg);
    }
  };
  $('dlgUpdateTask').onclick=async ()=>{
    if(!occupiedEntity)return;
    if(occupiedEntity.type==='agent'){
      const a=occupiedEntity.data;
      await sendAgentMessage(a,`Task update: ${$('dlgInput').value||'Stay available.'}`,true);
    }else if(occupiedEntity.type==='building'){
      const b=occupiedEntity.data;
      await api('/api/action', 'POST', {action:b.action,entity:b,note:$('dlgInput').value||'Working'});
    }
  };
}

async function openDialog(entity){
  occupiedEntity=entity;
  const key=entity.type==='agent'?`agent:${entity.data.name}`:`building:${entity.kind}`;
  let d=DIALOG[key];
  if(!d){
    if(entity.type==='agent') dialogForAgent(entity.data);
    else dialogForBuilding(entity.kind,entity.data);
    d=DIALOG[key];
  }
  $('dialog').style.display='block';
  $('dlgTitle').textContent=d.title||'…';
  $('dlgPersonality').textContent=d.profileLabel||'';
  $('dlgTaskText').textContent=d.profile||'';
  const a=[];
  if(d.type==='building'&&entity.data.action){
    a.push({label:entity.data.actionLabel||entity.data.action||'Act',action:`building:${entity.data.action}`});
  }else if(d.type==='agent'){
    a.push({label:'Set task',action:`agent:${entity.data.name}:task`});
    if(entity.data.suggestedActionKey){
      a.push({label:'Trigger task',action:entity.data.suggestedActionKey});
    }
  }
  if(entity.data.safeNote){
    $('dlgRecent').textContent=(entity.data.safeNote);
  }else{
    $('dlgRecent').textContent='';
  }
  $('dlgActions').innerHTML=a.map(x=>`<button data-action="${x.action}">${x.label}</button>`).join('');
  $('dlgActions').querySelectorAll('button').forEach(btn=>{
    btn.onclick=async ()=>{
      const act=btn.dataset.action;
      const raw=act.startsWith('agent:')?'agent_message':act.startsWith('building:')?(act.slice(9)||entity.data.action):act;
      await api('/api/action','POST',{action:raw,entity:entity.data});
      closeDialog();
    };
  });
  $('dlgInput').focus();
}
function closeDialog(){$('dialog').style.display='none';occupiedEntity=null}

async function sendAgentMessage(agent,text,isTask=false){
  await api('/api/action','POST',{action:'agent_message',agent,text,isTask});
}
async function sendBuildingAction(building,text){
  await api('/api/action','POST',{action:building.action,building,note:text});
}

const TILE_MAP={cols:100,rows:100,grid:[]};
const BUILDING_RECTS=[];
for(let y=0;y<100;y++){
  TILE_MAP.grid[y]=[];
  for(let x=0;x<100;x++){
    TILE_MAP.grid[y][x]=0;
  }
}

function drawTile(gx,gy){
  const t=TILE_MAP.grid[gy][gx];
  const x=gx*16,y=gy*16;
  if(t===0){ctx.fillStyle='#1a130c';ctx.fillRect(x,y,16,16);return;}
  if(t===1){ctx.fillStyle='#4a3220';ctx.fillRect(x,y,16,16);ctx.fillStyle='#3c2a1a';ctx.fillRect(x,y+12,16,4);return;}
  if(t===2){ctx.fillStyle='#1f3118';ctx.fillRect(x,y,16,16);ctx.fillStyle='#223a18';ctx.fillRect(x,y,16,3);ctx.fillRect(x,y,3,16);return;}
  if(t===3){ctx.fillStyle='#1a1c1a';ctx.fillRect(x,y,16,16);ctx.fillStyle='#242724';ctx.fillRect(x,y,16,3);return;}
  if(t>=4&&t<=7){ctx.fillStyle='#0c262f';ctx.fillRect(x,y,16,16);ctx.fillStyle='#0a2c38';ctx.fillRect(x,y+2,16,6);ctx.fillRect(x,y+10,16,4);return;}
}
function drawBuilding(b){
  const x=b.x*16,y=b.y*16,w=b.w*16,h=b.h*16;
  ctx.fillStyle='#6a3c16';ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#3a1f0b';ctx.lineWidth=2;ctx.strokeRect(x+.5,y+.5,w-1,h-1);
  ctx.fillStyle='#d8aa56';ctx.fillRect(x+2,y+2,w-4,8);
  ctx.fillStyle='#3a1f0b';if(b.label)ctx.font='bold 10px monospace';ctx.fillText(b.label,x+4,y+12,Math.max(0,w-10));
  ctx.fillStyle='#2a1407';ctx.fillRect(x+w/2-2,y+10,4,12);
}
function drawNPC(a){
  const p=gridToPixel(Math.round(a.x),Math.round(a.y));
  ctx.font='14px monospace';ctx.fillStyle='#f2c96e';ctx.textAlign='center';
  ctx.fillText(a.emoji||'🧑‍💼',p.x+8,p.y+18);
  ctx.fillText((a.name||'?').split(' ').at(-1)||'?',p.x+8,p.y+32,90);
  ctx.textAlign='start';
}
function tryInteract(px,py){
  const gx=Math.floor(px),gy=Math.floor(py);
  for(const id of Object.keys(state.buildings||{})){
    const b=state.buildings[id];
    if(b.x===undefined)continue;
    if(gx>=b.x&&gx<b.x+b.w&&gy>=b.y&&gy<b.y+b.h){
      dialogForBuilding(id,b);openDialog({type:'building',kind:id,data:b});return;
    }
  }
  let nearest=null,nd=42;
  for(const a of state.agents){
    const dx=Math.round(a.x)-gx,dy=Math.round(a.y)-gy,d=dx*dx+dy*dy;
    if(d<nd){nd=d;nearest=a;}
  }
  if(nearest){
    dialogForAgent(nearest);openDialog({type:'agent',kind:nearest.name,data:nearest});
  }
}

function movePlayer(dt){
  const speed=state.keys['w']||state.keys['arrowup']||state.keys['s']||state.keys['arrowdown']?-2.0:state.keys['a']||state.keys['arrowleft']||state.keys['d']||state.keys['arrowright']?-2.0:0;
  if(speed===0){
    if(walkQueue.length){
      const n=walkQueue.shift();
      if(n)walkTowards(n.x,n.y);
    }else{
      return null;
    }
  }
  let dx=0,dy=0;
  if(state.keys['w']||state.keys['arrowup']||state.keys['s']||state.keys['arrowdown']){
    if(state.keys['w']||state.keys['arrowup'])dy=-1; else dy=1;
  }
  if(state.keys['a']||state.keys['arrowleft']||state.keys['d']||state.keys['arrowright']){
    if(state.keys['a']||state.keys['arrowleft'])dx=-1; else dx=1;
  }
  const p=state.player;
  const nx=p.tileX+dx*0.14, ny=p.tileY+dy*0.14;
  const xr=Math.abs(nx-Math.round(nx))<0.08?Math.round(nx):nx;
  const yr=Math.abs(ny-Math.round(ny))<0.08?Math.round(ny):ny;
  const canX=!collides(xr,Math.round(p.tileY));
  const canY=!collides(Math.round(p.tileX),yr);
  if(!canX&&!canY)return null;
  if(canX)p.tileX=clamp(nx,0,TILE_MAP.cols-1);
  if(canY)p.tileY=clamp(ny,0,TILE_MAP.rows-1);
  return {x:Math.round(p.tileX),y:Math.round(p.tileY)};
}

function walls(b){
  b.x=clamp(b.x||40,1,TILE_MAP.cols-10);
  b.y=clamp(b.y||40,1,TILE_MAP.rows-10);
  const bx=b.x,by=b.y,bw=b.w||5,bh=b.h||4;
  for(let y=by;y<by+bh;y++)for(let x=bx;x<bx+bw;x++)if(inBounds(x,y))TILE_MAP.grid[y][x]=3;
  BUILDING_RECTS.push({x:bx,y:by,w:bw,h:bh});
}

(async function init(){
  const setLoading = (msg)=>{
    const el = $('loading');
    if (!el) return;
    el.innerHTML = msg || 'Loading Agent Farm…<br><span style="opacity:.7;font-size:12px">Fetching farm state…</span>';
  };
  try{
    const [stateObj]=await Promise.all([api('/api/state')]);
    Object.assign(state,stateObj);
    for(const a of state.agents){dialogForAgent(a);}
    for(const [id,b] of Object.entries(state.buildings||{})){dialogForBuilding(id,b);}
    $('loading').style.display='none';
  }catch(e){
    setLoading('Backend unreachable: ' + e.message);
    return;
  }
  const place=(m,mx,my)=>{m.forEach(o=>{o.x=o.x+(mx||0);o.y=o.y+(my||0);})};
  const farm = [
    {id:'agent_barracks',x:18,y:8,w:8,h:6,label:'Barracks'},
    {id:'revenue_vault',x:72,y:8,w:8,h:6,label:'Vault'},
    {id:'outreach_tower',x:18,y:68,w:8,h:6,label:'Outreach'},
    {id:'operations_foundation',x:72,y:68,w:8,h:6,label:'Workshop'},
    {id:'client_hall',x:45,y:40,w:8,h:6,label:'Clients'},
    {id:'market',x:45,y:8,w:8,h:4,label:'Market'},
    {id:'hr_station',x:45,y:72,w:8,h:4,label:'HR'},
  ];
  farm.forEach(b=>{walls(b);state.buildings[b.id]=state.buildings[b.id]||b});

  state.player={tileX:40,tileY:50};
  const trees=buildTree();
  place(Object.values(trees));
  for(const y of [];){
    for(let x=0;x<TILE_MAP.cols;x++){
      if(!collides(x,y)&&Math.random()<.0015)TILE_MAP.grid[y][x]=2;
    }
  }

  window.walkToAgent=(name)=>{
    const a=state.agents.find(x=>(x.name||'').toLowerCase()===name.toLowerCase());
    if(!a)return false;
    enqueueWalk(Math.round(a.x),Math.round(a.y));
    setTimeout(()=>{dialogForAgent(a);openDialog({type:'agent',kind:a.name,data:a})},220);
    return true;
  };
  window.walkToBuilding=(id)=>{
    const b=state.buildings[id];
    const cx=Math.round((b.x||0)+(b.w||0)/2);
    const cy=Math.round((b.y||0)+(b.h||0)/2);
    enqueueWalk(cx,cy);
    setTimeout(()=>{dialogForBuilding(id,b);openDialog({type:'building',kind:id,data:b})},220);
    return true;
  };
  window.requestDialog=(name)=>{
    const a=state.agents.find(x=>(x.name||'').toLowerCase()===name.toLowerCase());
    if(!a)return;
    dialogForAgent(a);openDialog({type:'agent',kind:a.name,data:a});
  };

  function resize(){
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;centerOnPlayer(cam);
  }
  resize();
  window.addEventListener('resize',resize);

  function dialogInputFocused(){
    const el = document.activeElement;
    if (!el) return false;
    const tag = (el.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea') return true;
    return el.isContentEditable;
  }
  window.addEventListener('keydown',e=>{
    const k = e.key.toLowerCase();
    state.keys[k]=true;
    if (occupiedEntity) {
      if (dialogInputFocused()) return;
      if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) {
        closeDialog();
      }
    }
  });
  window.addEventListener('keyup',e=>{state.keys[e.key.toLowerCase()]=false});
  canvas.addEventListener('mousedown',(e)=>{
    const rect=canvas.getBoundingClientRect();
    const px=(e.clientX-rect.left)/16+cam.x;
    const py=(e.clientY-rect.top)/16+cam.y;
    enqueueWalk(Math.floor(px),Math.floor(py));
  });

  let frame=0,lastRender=performance.now();
  function loop(now){
    requestAnimationFrame(loop);
    const dt=Math.min(0.1,(now-lastRender)/1000);lastRender=now;
    const walked=movePlayer(dt);
    cam.x+=(state.player.tileX-canvas.width/2/16-cam.x)*Math.min(1,dt*6);
    cam.y+=(state.player.tileY-canvas.height/2/16-cam.y)*Math.min(1,dt*6);

    ctx.fillStyle='#110b04';ctx.fillRect(0,0,canvas.width,canvas.height);
    const startCol=Math.max(0,Math.floor(cam.x)-1), endCol=Math.min(TILE_MAP.cols,Math.ceil(cam.x)+Math.floor(canvas.width/16)+2);
    const startRow=Math.max(0,Math.floor(cam.y)-1), endRow=Math.min(TILE_MAP.rows,Math.ceil(cam.y)+Math.floor(canvas.height/16)+2);
    for(let y=startRow;y<endRow;y++)
      for(let x=startCol;x<endCol;x++)
        drawTile(x,y);
    for(const [id,b] of Object.entries(state.buildings||{})) if(b.x!==undefined) drawBuilding(b);
    const entities=[...state.agents.map(a=>({y:Math.round(a.y),type:'agent',data:a})),{y:Math.round(state.player.tileY),type:'player'}];
    entities.sort((a,b)=>a.y-b.y);
    for(const ent of entities){
      if(ent.type==='player'){
        const pp=gridToPixel(Math.round(state.player.tileX),Math.round(state.player.tileY));
        ctx.font='16px monospace';ctx.fillStyle='#ffd972';ctx.fillText('🧑‍💼',pp.x+4,pp.y+18);
      }else drawNPC(ent.data);
    }
    if(walkTarget){}
    frame++;
  }
  centerOnPlayer(cam);
  requestAnimationFrame(loop);
  wireDialog();
})();
</script>
</body>
</html>
